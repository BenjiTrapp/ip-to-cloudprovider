name: Quality Check after Commit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Lint
      run: |
        go vet ./...
        test -z "$(gofmt -l .)" || (echo "Files need formatting:" && gofmt -l . && exit 1)

    - name: Build
      run: make build

    - name: Test
      run: make test

    - name: Test with race detector
      run: go test -race ./...
